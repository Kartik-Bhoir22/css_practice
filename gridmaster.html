<!doctype html>
<!--[if lt IE 7]>      <html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if IE 7]>         <html class="no-js lt-ie9 lt-ie8"> <![endif]-->
<!--[if IE 8]>         <html class="no-js lt-ie9"> <![endif]-->
<!--[if gt IE 8]>      <html class="no-js"> <!--<![endif]-->
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="" />
    <style>
      body,
      html {
        padding: 20px;
        margin: 0;
        box-sizing: border-box;
      }

      .container {
        margin-left: 20px;
        border: 1px solid black;
        padding: 20px;
      }
      .grid-container {
        display: grid;
        gap: 10px;
        background-color: rgb(185, 185, 185);
        margin-bottom: 20px;
        padding: 10px;
      }

      .box {
        padding: 20px;
        background-color: rgb(0, 76, 255);
        font-size: 19px;
        color: white;
        text-align: center;
      }

      .box:nth-child(even) {
        background-color: red;
      }
    </style>
  </head>
  <body>
    <!--[if lt IE 7]>
      <p class="browsehappy">
        You are using an <strong>outdated</strong> browser. Please
        <a href="#">upgrade your browser</a> to improve your experience.
      </p>
    <![endif]-->

    <div class="container">
      <h1>grid 3x3</h1>
      <div
        class="grid-container"
        style="
          grid-template-columns: repeat(3, 2fr);
          grid-template-rows: repeat(3, 100px);
        "
      >
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
        <div class="box">9</div>
      </div>
    </div>

    <div class="container">
      <h1>grid with different column sizes</h1>
      <div class="grid-container" style="grid-template-columns: 1fr 2fr 1fr">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
      </div>
    </div>
    <div class="container">
      <h1>grid with gaps</h1>
      <div
        class="grid-container"
        style="grid-template-columns: repeat(3, 1fr); gap: 20px"
      >
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
      </div>
    </div>
    <div class="container">
      <h1>grid with item placement</h1>
      <div
        class="grid-container"
        style="grid-template-columns: repeat(3, 1fr); gap: 10px"
      >
        <div class="box" style="grid-column: 1/3; grid-row: 1/3">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box" style="grid-column: 2/4">5</div>
      </div>
    </div>

    <div class="container">
      <h1>grid template areas</h1>
      <div class="grid-container">
        <div class="box" style="grid-column: 1/4; grid-row: 1/2">Header</div>
        <div class="box" style="grid-column: 1; grid-row: 2/5">Sidebar</div>
        <div class="box" style="grid-column: 2/4; grid-row: 2/4">
          Main Content
        </div>
        <div class="box" style="grid-column: 2/4; grid-row: 4/5">Footer</div>
      </div>
    </div>

    <div class="container">
      <h1>grid item placement 2.0</h1>
      <div
        class="grid-container"
        style="
          grid-template-areas: &quot;Header Header Header&quot; &quot;Sidebar Maincontent Maincontent&quot; &quot;Footer Footer Footer&quot;;
        "
      >
        <div class="box" style="grid-area: Header">Header</div>
        <div class="box" style="grid-area: Sidebar">Sidebar</div>
        <div class="box" style="grid-area: Maincontent">Maincontent</div>
        <div class="box" style="grid-area: Footer">Footer</div>
      </div>
    </div>

    <script src="" async defer></script>
  </body>
</html>
