<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .model_box {
        padding: 20px;
        width: 300px;
        height: 200px;
        border: 5px solid black;
        background: grey;
      }

      .content_box {
        box-sizing: content-box;
      }

      .border_box {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="model_box content_box">
      <p>
        this contain 350px width (40px padding 10px border) and 250px
        height(40px padding)10px border
      </p>
    </div>
    <br /><br />

    <div class="model_box border_box">
      <p>
        this contain 350px width (40px padding 10px border) and 250px
        height(40px padding)10px border
      </p>
    </div>
  </body>
</html>
