<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        padding: 20px;
        margin: 0;
        background: #1a1a1a;
        color: #fff;
      }

      .nav-container {
        margin-bottom: 40px;
      }

      .nav1 {
        margin-bottom: 10px;
        background: #f8f9fa;
        border-radius: 15px;
        padding: 10px;
      }

      .nav1 ul {
        list-style: none;
        display: flex;
        justify-content: space-around;
        margin: 0;
        padding: 0;
      }

      .nav1 li {
        display: inline;
      }

      .nav1 a {
        text-decoration: none;

        padding: 5px 10px;
        border-radius: 10px;
        position: relative;
      }

      .nav1 a::after {
        content: "";
        position: absolute;
        width: 100%;
        bottom: 0;
        height: 2px;
        left: 0;
        background-color: darkblue;
        transform: scaleX(0);
        transition: transform 0.3s ease-in-out;
      }

      .nav1 a:hover::after {
        transform: scale(1);
      }

      .nav2 {
        background: darkgreen;
        padding: 20px;
        width: 200px;
      }

      .nav2 ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
      }

      .nav2 li {
        margin-bottom: 10px;
      }

      .nav2 a {
        display: block;
        text-decoration: none;
        color: white;
        padding: 10px;
        width: 100%;
      }

      .nav2 a:hover {
        background: lightgreen;
        color: black;
      }

      .nav2 .login-btn {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        cursor: pointer;
        background: green;
        color: white;
      }

      .nav2 .login-btn:hover {
        background-color: lightgreen;
        color: black;
      }
    </style>
  </head>
  <body>
    <div class="nav-container">
      <h2>var 1: nav bar using horizontal underline effect</h2>
      <nav class="nav1">
        <ul>
          <li><a href="#">home</a></li>
          <li><a href="#">contact</a></li>
          <li><a href="#">product</a></li>
          <li><button class="login-btn">login</button></li>
        </ul>
      </nav>
    </div>
    <div class="nav-container">
      <h2>var 2: nav bar using vertical hover effect</h2>
      <nav class="nav2">
        <ul>
          <li><a href="#">home</a></li>
          <li><a href="#">contact</a></li>
          <li><a href="#">product</a></li>
          <li><button class="login-btn">login</button></li>
        </ul>
      </nav>
    </div>
    <div class="nav-container">
      <h2>var 3: nav bar using horizontal dropdown effect</h2>
      <nav class="nav3">
        <ul>
          <li><a href="#">home</a></li>
          <li><a href="#">contact</a></li>
          <li><a href="#">product</a></li>
          <li><button class="login-btn">login</button></li>
        </ul>
      </nav>
    </div>

    <script src="" async defer></script>
  </body>
</html>
